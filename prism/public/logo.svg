<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D63031;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84393;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BFA5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ABC9C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00897B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#0D47A1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Top face (red-orange) -->
  <polygon points="100,50 140,75 100,100 60,75" fill="url(#grad1)" />
  
  <!-- Top-right face (red-pink) -->
  <polygon points="140,75 170,95 140,135 100,100" fill="url(#grad2)" />
  
  <!-- Top-left face (orange) -->
  <polygon points="60,75 100,100 70,135 30,95" fill="url(#grad3)" />
  
  <!-- Bottom-left face (teal-green) -->
  <polygon points="30,95 70,135 70,160 30,135" fill="url(#grad4)" />
  
  <!-- Bottom-right face (cyan-teal) -->
  <polygon points="140,135 170,95 170,135 140,160" fill="url(#grad5)" />
  
  <!-- Bottom face (dark blue) -->
  <polygon points="70,135 70,160 140,160 140,135" fill="url(#grad6)" />
</svg>
