<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055B8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00A8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield shape (rounded rectangle with pointed bottom) -->
  <path d="M 80 80 Q 80 60 100 60 L 412 60 Q 432 60 432 80 L 432 240 Q 432 350 256 420 Q 80 350 80 240 Z" 
        fill="url(#shieldGradient)" stroke="none"/>
  
  <!-- White checkmark -->
  <g stroke="white" stroke-width="50" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left diagonal of checkmark -->
    <path d="M 140 280 L 220 360"/>
    <!-- Right diagonal of checkmark -->
    <path d="M 220 360 L 380 160"/>
  </g>
</svg>